name: Deploy to AWS ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY_BACKEND: jobhub-backend
  ECR_REPOSITORY_WEB: jobhub-web
  ECR_REPOSITORY_AI: jobhub-ai

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest

      - name: Build and Push Web
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd web
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_WEB:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_WEB:latest

      - name: Build and Push AI Service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd ai-service
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_AI:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_AI:latest
