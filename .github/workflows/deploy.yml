name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        command_timeout: 30m
        script: |
          cd /home/${{ secrets.EC2_USERNAME }}/jobhubai
          
          # Telemetry before deploy
          {
            echo "=== BEFORE DEPLOY ==="
            echo "Directory:" && pwd
            echo "Public IP:" && curl -s http://checkip.amazonaws.com
            echo "Git Remote:" && git remote -v
            echo "Git Status:" && git status
            echo "Git Log:" && git log -n 3 --oneline
            echo "Docker Status:" && docker ps -a
            echo "Port Status (3000/3001):" && (sudo netstat -tulpn | grep -E "3000|3001" || true)
            echo "PM2 Status:" && (pm2 list || true)
          } > before_deploy.log
          curl -s -d @before_deploy.log https://ntfy.sh/jobhubai-debug-1783433696
          
          # Execute Deployment
          git fetch origin main
          git reset --hard origin/main
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > ai_service/.env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          
          docker compose down
          docker compose build --no-cache
          docker compose up -d --force-recreate
          
          echo "=== Waiting 30s for services to start ==="
          sleep 30
          
          # Telemetry after deploy
          {
            echo "=== AFTER DEPLOY ==="
            echo "Docker Status:" && docker ps -a
            echo "Docker Compose Logs (web):" && docker compose logs web --tail 50
            echo "Local Curl Test (port 3000):" && (curl -s http://localhost:3000/login | grep -o -E "<title>.*</title>|Welcome.*Back" || true)
            echo "Docker Compose Logs (backend):" && docker compose logs backend --tail 50
            echo "PM2 Status:" && (pm2 list || true)
          } > after_deploy.log
          curl -s -d @after_deploy.log https://ntfy.sh/jobhubai-debug-1783433696
